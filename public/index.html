  <!-- Apply saved theme before React paints to prevent flash -->
  <script>
    (function () {
      var t = localStorage.getItem('portfolio-theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
      document.body.style.backgroundColor = t === 'dark' ? '#030711' : '#f8fafc';
    })();
  </script>
